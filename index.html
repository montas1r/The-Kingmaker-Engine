<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recursive Locked-Network Voting Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Locked-Network Voting Visualizer (n = 6)</h1>
        <div id="phaseBadge" class="phase-indicator phase-1-badge">Phase 1: Raw Seeds</div>
    </header>

    <div class="main-container">
        <div class="canvas-section">
            <svg id="networkSvg">
                <defs>
                    <marker id="arrowhead-p1" markerWidth="10" markerHeight="7" refX="23" refY="3.5" orient="auto">
                        <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8" />
                    </marker>
                    <marker id="arrowhead-p2" markerWidth="8" markerHeight="6" refX="16" refY="3" orient="auto">
                        <polygon points="0 0, 8 3, 0 6" fill="#fbbf24" />
                    </marker>
                    <marker id="arrowhead-dead" markerWidth="6" markerHeight="4" refX="23" refY="2" orient="auto">
                        <polygon points="0 0, 6 2, 0 4" fill="#475569" />
                    </marker>
                </defs>
                <g id="linksGroup"></g>
                <g id="nodesGroup"></g>
            </svg>
        </div>

        <div class="control-section">
            <div class="panel-card">
                <h2>Simulation Control</h2>
                <div class="btn-group">
                    <button class="btn-primary" id="togglePhaseBtn">Run Phase 2</button>
                    <button class="btn-secondary" id="resetBtn">Reset</button>
                </div>
                <p id="helpText" style="font-size: 0.8rem; color: var(--text-muted);">
                    Phase 1: Configure who each person votes for. Every vote counts as 1 point.
                </p>
            </div>

            <div class="panel-card">
                <h2>Configure Target Allocations</h2>
                <div id="voteInputsContainer"></div>
            </div>

            <div class="panel-card">
                <h2>Live Matrix Leaderboard</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Person</th>
                            <th>Target</th>
                            <th>P1 Raw</th>
                            <th>P2 Weight</th>
                            <th>Rank</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
